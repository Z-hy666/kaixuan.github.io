 <meta charset="UTF-<meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Microsoft YaHei', 'Segoe UI', Roboto, sans-serif;
    }

    :root {
      --primary: #00dcff;
      --primary-dark: #00b3e6;
      --bg-dark: #0f0f13;
      --bg-card: #181822;
      --bg-header: rgba(18,18,24,0.85);
      --text-main: #fff;
      --text-secondary: #aaa;
      --text-gray: #777;
      --border-color: #2a2a35;
      --shadow: 0 12px 30px rgba(0,220,255,0.15);
    }

    body {
      background: var(--bg-dark);
      color: var(--text-main);
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    /* 滚动条美化 */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-card);
    }

    /* 通用样式 */
    .container {
      padding: 40px 5%;
      max-width: 1600px;
      margin: 0 auto;
    }
    .btn {
      padding: 12px 28px;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: #000;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,220,255,0.3);
    }
    .btn-outline {
      background: transparent;
      border: 2px solid var(--primary);
      color: var(--primary);
    }
    .section-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 4px solid var(--primary);
      padding-left: 12px;
    }
    .section-title span.more {
      font-size: 14px;
      color: var(--primary);
      cursor: pointer;
      transition: 0.3s;
    }
    .section-title span.more:hover {
      color: var(--primary-dark);
    }

    /* 导航栏 */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: var(--bg-header);
      backdrop-filter: blur(12px);
      padding: 14px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
      transition: padding 0.3s;
    }
    header.sticky {
      padding: 10px 5%;
    }
    .logo {
      font-size: 26px;
      font-weight: bold;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    nav ul {
      display: flex;
      list-style: none;
      gap: 35px;
    }
    nav a {
      color: var(--text-main);
      text-decoration: none;
      font-size: 16px;
      transition: 0.3s;
      position: relative;
    }
    nav a::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--primary);
      transition: width 0.3s;
    }
    nav a:hover {
      color: var(--primary);
    }
    nav a:hover::after {
      width: 100%;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .search {
      background: var(--bg-card);
      padding: 8px 16px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      gap: 10px;
      width: 280px;
      border: 1px solid var(--border-color);
      transition: 0.3s;
    }
    .search:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 8px rgba(0,220,255,0.2);
    }
    .search input {
      background: none;
      border: none;
      outline: none;
      color: var(--text-main);
      width: 100%;
      font-size: 14px;
    }
    .search input::placeholder {
      color: var(--text-gray);
    }
    .user-btn {
      color: var(--text-main);
      font-size: 20px;
      cursor: pointer;
      transition: 0.3s;
    }
    .user-btn:hover {
      color: var(--primary);
    }
    .mobile-menu {
      display: none;
      font-size: 24px;
      color: var(--text-main);
      cursor: pointer;
    }

    /* 轮播banner */
    .banner {
      height: 550px;
      margin-top: 70px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      padding: 0 5%;
    }
    .banner .banner-bg {
      position: absolute;
      right: 0;
      top: 0;
      width: 70%;
      height: 100%;
      background-position: center;
      background-size: cover;
      transition: background-image 1s ease;
      filter: brightness(0.6);
    }
    .banner-text {
      position: relative;
      z-index: 2;
      max-width: 600px;
      animation: fadeInLeft 1s ease;
    }
    @keyframes fadeInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .banner h1 {
      font-size: 48px;
      margin-bottom: 20px;
      line-height: 1.2;
    }
    .banner p {
      color: var(--text-secondary);
      margin-bottom: 30px;
      line-height: 1.8;
      font-size: 16px;
    }
    .banner-btns {
      display: flex;
      gap: 15px;
    }

    /* 分类筛选 */
    .category-section {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 20px 30px;
      margin-bottom: 40px;
    }
    .category-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: center;
    }
    .category-tab {
      padding: 8px 20px;
      border-radius: 20px;
      background: var(--bg-dark);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
    }
    .category-tab.active, .category-tab:hover {
      background: var(--primary);
      color: #000;
    }

    /* 视频网格 */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 25px;
      margin-bottom: 40px;
    }
    .video-card {
      background: var(--bg-card);
      border-radius: 14px;
      overflow: hidden;
      transition: all 0.35s ease;
      cursor: pointer;
      position: relative;
    }
    .video-card:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow: var(--shadow);
    }
    .video-thumb-box {
      position: relative;
      width: 100%;
      height: 140px;
      overflow: hidden;
    }
    .video-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s;
    }
    .video-card:hover .video-thumb {
      transform: scale(1.1);
    }
    .video-duration {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.7);
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 12px;
      color: var(--text-main);
    }
    .video-info {
      padding: 15px;
    }
    .video-title {
      font-size: 16px;
      margin-bottom: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-height: 1.4;
    }
    .video-meta {
      font-size: 12px;
      color: var(--text-gray);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .video-meta .type {
      background: rgba(0,220,255,0.1);
      color: var(--primary);
      padding: 2px 6px;
      border-radius: 3px;
    }
    .loading {
      text-align: center;
      padding: 30px;
      color: var(--text-gray);
      display: none;
    }
    .loading.show {
      display: block;
    }

    /* 登录注册弹窗 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(5px);
    }
    .modal-overlay.show {
      display: flex;
    }
    .modal-box {
      background: var(--bg-card);
      border-radius: 16px;
      width: 100%;
      max-width: 450px;
      padding: 40px 35px;
      position: relative;
      animation: modalFade 0.3s ease;
    }
    @keyframes modalFade {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 20px;
      color: var(--text-gray);
      cursor: pointer;
      transition: 0.3s;
    }
    .modal-close:hover {
      color: var(--primary);
    }
    .modal-tabs {
      display: flex;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--border-color);
    }
    .modal-tab {
      flex: 1;
      text-align: center;
      padding: 15px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-gray);
      position: relative;
    }
    .modal-tab.active {
      color: var(--primary);
    }
    .modal-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 3px;
      background: var(--primary);
      border-radius: 3px 3px 0 0;
    }
    .modal-content {
      display: none;
    }
    .modal-content.active {
      display: block;
    }
    .form-group {
      margin-bottom: 25px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-secondary);
      font-size: 14px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 15px;
      background: var(--bg-dark);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-main);
      outline: none;
      transition: 0.3s;
    }
    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 8px rgba(0,220,255,0.2);
    }
    .form-btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      margin-bottom: 20px;
    }
    .form-tip {
      text-align: center;
      color: var(--text-gray);
      font-size: 14px;
    }
    .form-tip span {
      color: var(--primary);
      cursor: pointer;
    }

    /* 视频播放页面 */
    .play-page {
      margin-top: 70px;
      padding: 30px 5%;
      display: none;
    }
    .play-page.show {
      display: block;
    }
    .home-page.hide {
      display: none;
    }
    .play-container {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
    }
    .play-main {
      flex: 1;
      min-width: 700px;
    }
    .play-sidebar {
      width: 350px;
      background: var(--bg-card);
      border-radius: 12px;
      padding: 20px;
    }
    .video-player {
      width: 100%;
      height: 480px;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
      position: relative;
    }
    .video-player video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .play-title {
      font-size: 24px;
      margin-bottom: 15px;
    }
    .play-info {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 20px;
      display: flex;
      gap: 20px;
    }
    .play-desc {
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 30px;
    }
    .back-btn {
      margin-bottom: 20px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      cursor: pointer;
      transition: 0.3s;
    }
    .back-btn:hover {
      color: var(--primary-dark);
    }
    .recommend-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .recommend-item {
      display: flex;
      gap: 12px;
      cursor: pointer;
      transition: 0.3s;
      padding: 8px;
      border-radius: 8px;
    }
    .recommend-item:hover {
      background: var(--bg-dark);
    }
    .recommend-thumb {
      width: 120px;
      height: 70px;
      border-radius: 6px;
      object-fit: cover;
    }
    .recommend-info {
      flex: 1;
    }
    .recommend-title {
      font-size: 14px;
      margin-bottom: 5px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .recommend-meta {
      font-size: 12px;
      color: var(--text-gray);
    }

    /* 底部 */
    footer {
      background: var(--bg-header);
      padding: 40px 5%;
      text-align: center;
      color: var(--text-gray);
      border-top: 1px solid var(--border-color);
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 25px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .footer-links a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: 0.3s;
    }
    .footer-links a:hover {
      color: var(--primary);
    }
    .copyright {
      font-size: 14px;
    }

    /* 响应式适配 */
    @media (max-width: 1200px) {
      .play-main {
        min-width: 100%;
      }
      .play-sidebar {
        width: 100%;
      }
    }
    @media (max-width: 992px) {
      nav ul {
        gap: 20px;
      }
      .search {
        width: 220px;
      }
      .banner {
        height: 450px;
      }
      .banner h1 {
        font-size: 36px;
      }
    }
    @media (max-width: 768px) {
      nav {
        display: none;
      }
      .mobile-menu {
        display: block;
      }
      .search {
        display: none;
      }
      .banner {
        height: 400px;
      }
      .banner h1 {
        font-size: 28px;
      }
      .video-grid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      }
      .video-thumb-box {
        height: 120px;
      }
    }
    @media (max-width: 480px) {
      .video-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 15px;
      }
      .banner-btns {
        flex-direction: column;
        gap: 10px;
      }
      .btn {
        padding: 10px 20px;
      }
</style</head>

    {id:5,title:'满江红',type:'电影',duration:'159:00',thumb:'https://picsum.photos/id/5/400/225',desc:'南宋绍兴年间，岳飞死后四年，秦桧率兵与金国会谈，金国使者带来密信，小兵与亲兵营副统领孙均在一个时辰内，揭开了一个巨大阴谋。',info:'悬疑 | 2023 | 沈腾、易烊千玺'},
    {id:6,title:'向往的生活 第七季',type:'综艺',duration:'90:00',thumb:'https://picsum.photos/id/6/400/225',desc:'蘑菇屋家人回归，远离城市喧嚣，体验田园生活，用美食和陪伴治愈心灵，感受简单的幸福。',info:'综艺 | 2023 | 黄磊、何炅'},
    {id:7,title:'三体',type:'剧集',duration:'40:00/集',thumb:'https://picsum.photos/id/7/400/225',desc:'纳米材料学家汪淼与刑警史强共同揭开了地外文明“三体”的神秘面纱，面对人类文明的终极挑战。',info:'科幻 | 2023 | 张鲁一、于和伟'},
    {id:8,title:'深海',type:'动漫',duration:'112:00',thumb:'https://picsum.photos/id/8/400/225',desc:'少女参宿误入深海秘境，遇见独特的深海大饭店，在一段奇幻旅程中，找回勇气与希望，治愈内心伤痛。',info:'动画 | 2023 | 国产动画'},
  ];

  // 轮播图数据
  const bannerData = [
    {img:'https://picsum.photos/id/1048/1920/1080',title:'流浪地球2',desc:'太阳即将毁灭，人类在地球表面建造出巨大的推进器，寻找新的家园，宇宙之路危机四伏，为了拯救地球，流浪地球时代的年轻人再次挺身而出。'},
    {img:'https://picsum.photos/id/1039/1920/1080',title:'满江红',desc:'南宋绍兴年间，岳飞死后四年，秦桧率兵与金国会谈，金国使者带来密信，小兵与亲兵营副统领孙均在一个时辰内，揭开了一个巨大阴谋。'},
    {img:'https://picsum.photos/id/1060/1920/1080',title:'三体',desc:'纳米材料学家汪淼与刑警史强共同揭开了地外文明“三体”的神秘面纱，面对人类文明的终极挑战。'}
  ];

  // DOM加载完成
  document.addEventListener('DOMContentLoaded', function() {
    // 渲染视频列表
    renderVideoList(videoData);
    // 轮播切换
    initBanner();
    // 导航栏吸顶
    window.addEventListener('scroll', handleHeaderSticky);
    // 无限滚动加载
    window.addEventListener('scroll', handleScrollLoad);
    // 弹窗切换
    initModalTabs();
  });

  // 渲染视频列表
  function renderVideoList(data) {
    const grid = document.getElementById('videoGrid');
    grid.innerHTML = '';
    data.forEach(item => {
      const card = document.createElement('div');
      card.className = 'video-card';
      card.onclick = () => playVideo(item.id);
      card.innerHTML = `<div class="video-thumb-box">
<img src="${item.thumb}" class="video-thumb" alt="${item.title}">
          <div class="video-duration"></div</div><div class="video-info">
          <div class="video-title"></div><div class="video-meta">
           <span class="type"></span>
            <span><i class="fas fa-eye"></i> 10万</span>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  // 初始化轮播
  function initBanner() {
    const bannerBg = document.getElementById('bannerBg');
    let index = 0;
    bannerBg.style.backgroundImage = `url(${bannerData[index].img})`;
    setInterval(() => {
      index = (index + 1) % bannerData.length;
      bannerBg.style.backgroundImage = `url(${bannerData[index].img})`;
      document.querySelector('.banner-text h1').textContent = bannerData[index].title;
      document.querySelector('.banner-text p').textContent = bannerData[index].desc;
    }, 5000);
  }

  // 导航栏吸顶
  function handleHeaderSticky() {
    const header = document.getElementById('header');
    if (window.scrollY > 50) {
      header.classList.add('sticky');
    } else {
      header.classList.remove('sticky');
    }
  }

  // 分类筛选
  function filterCategory(type) {
    document.querySelectorAll('.category-tab').forEach(tab => tab.classList.remove('active'));
    event.target.classList.add('active');
    let filterData;
    if (type === '全部') {
      filterData = videoData;
    } else {
      filterData = videoData.filter(item => item.type === type || item.info.includes(type));
    }
    renderVideoList(filterData);
  }

  // 无限滚动加载
  function handleScrollLoad() {
    const loading = document.getElementById('loading');
    const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
    const scrollHeight = document.documentElement.scrollHeight || document.body.scrollHeight;
    const clientHeight = document.documentElement.clientHeight || window.innerHeight;
    
    if (scrollTop + clientHeight >= scrollHeight - 200 && !loading.classList.contains('show')) {
      loading.classList.add('show');
      // 模拟加载延迟
      setTimeout(() => {
        const newData = [...videoData]; // 模拟新增数据
        renderVideoList([...document.getElementById('videoGrid').children, ...newData]);
        loading.classList.remove('show');
      }, 1500);
    }
  }

  // 弹窗操作
  function openModal() {
    document.getElementById('modalOverlay').classList.add('show');
  }
  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
  }
  function initModalTabs() {
    const tabs = document.querySelectorAll('.modal-tab');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => switchTab(tab.dataset.tab));
    });
  }
  function switchTab(tabName) {
    document.querySelectorAll('.modal-tab').forEach(tab => tab.classList.remove('active'));
    document.querySelectorAll('.modal-content').forEach(content => content.classList.remove('active'));
    document.querySelector(`.modal-tab[data-tab="${tabName}"]`).classList.add('active');
    document.getElementById(`${tabName}Form`).classList.add('active');
  }

  // 播放视频
  function playVideo(id) {
    const video = videoData.find(item => item.id === id);
    if (!video) return;
    // 切换页面
    document.getElementById('homePage').classList.add('hide');
    document.getElementById('playPage').classList.add('show');
    // 填充播放页数据
    document.getElementById('playTitle').textContent = video.title;
    document.getElementById('playInfo').textContent = video.info;
    document.getElementById('playDesc').textContent = video.desc;
    document.getElementById('videoPlayer').src = video.thumb.replace('400/225', '1280/720'); // 模拟视频地址
    // 渲染相关推荐
    renderRecommend(video.id);
    // 滚动到顶部
    window.scrollTo(0, 0);
  }

  // 渲染相关推荐
  function renderRecommend(currentId) {
    const list = document.getElementById('recommendList');
    list.innerHTML = '';
    const recommendData = videoData.filter(item => item.id !== currentId).slice(0, 6);
    recommendData.forEach(item => {
      const itemEl = document.createElement('div');
      itemEl.className = 'recommend-item';
      itemEl.onclick = () => playVideo(item.id);
      itemEl.innerHTML = `<img src="${item.thumb}" class="recommend-thumb" alt="${item.title}">
<div class="recommend-info">
          <div class="recommend-title</div<div class="recommend-meta">${item.type} · ${</div></div>
      `;
      list.appendChild(itemEl);
    });
  }

  // 返回首页
  function goHome() {
    document.getElementById('playPage').classList.remove('show');
    document.getElementById('homePage').classList.remove('hide');
    window.scrollTo(0, 0);
  }

  // 搜索功能
  document.getElementById('searchInput').addEventListener('input', function(e) {
    const keyword = e.target.value.trim().toLowerCase();
    if (!keyword) {
      renderVideoList(videoData);
      return;
    }
    const searchData = videoData.filter(item => item.title.toLowerCase().includes(keyword) || item.type.toLowerCase().includes(keyword));
    renderVideoList(searchData);
  });
</body</html>
